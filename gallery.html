<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View the Masti Mongsters gallery wall. Gentle, weightless photos drift dynamically. Click items to launch our media viewer.">
  <title>Gallery - Masti Mongsters</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation injected by main.js -->
  <header></header>

  <main>
    <h1 class="page-title">The <span class="text-glow-pink">Memory</span> Wall</h1>
    <p class="page-subtitle">A drifting depository of our road trips, chat highlights, memes, and meetups. Drag items, toss them around, or click to inspect.</p>

    <!-- Floating Canvas Wall Container -->
    <section class="gallery-canvas-wrapper">
      <div class="gallery-instruction">
        <span>💡 Info:</span> Grab, throw, or push cards. Hover near them to repel. Click to enlarge.
      </div>
      <div id="gallery-canvas" style="width: 100%; height: 100%; position: relative;">
        <!-- Injected dynamically by js/gallery.js -->
      </div>
    </section>
  </main>

  <!-- Lightbox Modal Viewer -->
  <div id="lightbox" class="lightbox" aria-modal="true" role="dialog">
    <button id="lightbox-close" class="lightbox-close" aria-label="Close Lightbox">✕</button>
    <div class="lightbox-content">
      <img id="lightbox-img" class="lightbox-img" src="" alt="Enlarged gallery item">
      <!-- Media SVG containers will be injected in front of image dynamically by JS -->
      <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>
  </div>

  <!-- Footer injected by main.js -->
  <footer></footer>

  <!-- Scripts -->
  <script src="js/physics.js"></script>
  <script src="js/main.js"></script>
  <script src="js/gallery.js"></script>
  <script>
    // Initialize common header/footer components for this page
    createSharedComponents('gallery');
  </script>
</body>
</html>

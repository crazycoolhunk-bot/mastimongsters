<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff14" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
    <linearGradient id="pinkGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#ffe600" />
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#121212" stop-opacity="1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="1" />
    </radialGradient>
    <!-- Dropshadow filter -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle Badge -->
  <circle cx="250" cy="250" r="230" fill="url(#bgGlow)" stroke="url(#neonGlow)" stroke-width="6" filter="url(#glowFilter)" />
  
  <!-- Inner Ring -->
  <circle cx="250" cy="250" r="170" fill="none" stroke="#222" stroke-dasharray="10 8" stroke-width="3" />

  <!-- Outer Splashes (Visual hints) -->
  <path d="M70,120 Q50,70 110,60" fill="none" stroke="#ff007f" stroke-width="4" stroke-linecap="round" />
  <path d="M410,100 Q440,150 400,180" fill="none" stroke="#ffe600" stroke-width="4" stroke-linecap="round" />
  <path d="M90,390 Q120,430 80,440" fill="none" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" />

  <!-- Center WhatsApp Phone Bubble Logo -->
  <g transform="translate(200, 200) scale(1.67)" filter="url(#glowFilter)">
    <!-- WhatsApp green speech bubble -->
    <circle cx="30" cy="30" r="26" fill="#25d366" />
    <!-- Bubble pointer -->
    <path d="M12,47 L15,38 C13.5,35.5 12.8,32.8 12.8,30 C12.8,20.5 20.5,12.8 30,12.8 C34.6,12.8 38.9,14.6 42.1,17.9 C45.4,21.1 47.2,25.4 47.2,30 C47.2,39.5 39.5,47.2 30,47.2 C27.3,47.2 24.7,46.6 22.3,45.3 L12,47 Z" fill="#25d366" />
    <!-- White Phone Receiver Symbol -->
    <path d="M22,20 C21.4,19.4 20.6,19.4 20,20 L18.2,21.8 C17.6,22.4 17.4,23.3 17.8,24.1 C19.6,28 22,31.4 25.9,33.2 C26.7,33.6 27.6,33.4 28.2,32.8 L30,31 C30.6,30.4 30.6,29.6 30,29 L26.8,25.8 C26.2,25.2 25.4,25.2 24.8,25.8 L23.7,26.9 C23.4,27.2 23,27.2 22.7,27 C20.9,25.9 19.1,24.1 18,22.3 C17.8,22 17.8,21.6 18.1,21.3 L19.2,20.2 C19.8,19.6 19.8,18.8 19.2,18.2 L22,20 Z" fill="#fff" transform="translate(5, 5) scale(0.85)" />
    <!-- Inner White Line details for bubble border -->
    <path d="M19,41 L17,45 L22,44 C24.4,45.4 27.1,46.1 30,46.1 C38.9,46.1 46.1,38.9 46.1,30 C46.1,21.1 38.9,13.9 30,13.9 C21.1,13.9 13.9,21.1 13.9,30 C13.9,32.9 14.6,35.6 16,38 L19,41 Z" fill="none" stroke="#fff" stroke-width="1.5" />
  </g>

  <!-- 6 Cartoon Avatars Ring -->
  <!-- Avatar 1: Top (12 o'clock) -->
  <g transform="translate(250, 48)">
    <circle cx="0" cy="0" r="32" fill="#39ff14" stroke="#000" stroke-width="3" />
    <!-- Face details (Cool Shades) -->
    <rect x="-18" y="-8" width="16" height="12" rx="4" fill="#000" />
    <rect x="2" y="-8" width="16" height="12" rx="4" fill="#000" />
    <line x1="-2" y1="-2" x2="2" y2="-2" stroke="#000" stroke-width="3" />
    <path d="M-10,12 Q0,18 10,12" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Avatar 2: Top Right (2 o'clock) -->
  <g transform="translate(410, 140)">
    <circle cx="0" cy="0" r="32" fill="#ff007f" stroke="#000" stroke-width="3" />
    <!-- Face details (Winking) -->
    <circle cx="-10" cy="-6" r="4" fill="#000" />
    <path d="M6,-6 Q12,-12 12,-6" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" />
    <path d="M-8,12 Q0,4 8,12" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Avatar 3: Bottom Right (4 o'clock) -->
  <g transform="translate(410, 360)">
    <circle cx="0" cy="0" r="32" fill="#00e5ff" stroke="#000" stroke-width="3" />
    <!-- Face details (Happy Goggles) -->
    <circle cx="-9" cy="-4" r="7" fill="none" stroke="#000" stroke-width="4" />
    <circle cx="9" cy="-4" r="7" fill="none" stroke="#000" stroke-width="4" />
    <line x1="-2" y1="-4" x2="2" y2="-4" stroke="#000" stroke-width="3" />
    <path d="M-12,10 Q0,20 12,10" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Avatar 4: Bottom (6 o'clock) -->
  <g transform="translate(250, 452)">
    <circle cx="0" cy="0" r="32" fill="#ffe600" stroke="#000" stroke-width="3" />
    <!-- Face details (Tongue Out) -->
    <circle cx="-10" cy="-6" r="4" fill="#000" />
    <circle cx="10" cy="-6" r="4" fill="#000" />
    <path d="M-10,8 Q0,12 10,8" fill="none" stroke="#000" stroke-width="3" />
    <path d="M-6,10 C-6,18 6,18 6,10 Z" fill="#ff007f" />
  </g>

  <!-- Avatar 5: Bottom Left (8 o'clock) -->
  <g transform="translate(90, 360)">
    <circle cx="0" cy="0" r="32" fill="#ff007f" stroke="#000" stroke-width="3" />
    <!-- Face details (Star Eyes) -->
    <!-- Star Left -->
    <path d="M-12,-12 L-9,-6 L-3,-6 L-8,-2 L-6,4 L-12,0 L-18,4 L-16,-2 L-21,-6 L-15,-6 Z" fill="#ffe600" stroke="#000" stroke-width="1" />
    <!-- Star Right -->
    <path d="M12,-12 L15,-6 L21,-6 L16,-2 L18,4 L12,0 L6,4 L8,-2 L3,-6 L9,-6 Z" fill="#ffe600" stroke="#000" stroke-width="1" />
    <path d="M-8,12 Q0,18 8,12" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Avatar 6: Top Left (10 o'clock) -->
  <g transform="translate(90, 140)">
    <circle cx="0" cy="0" r="32" fill="#00e5ff" stroke="#000" stroke-width="3" />
    <!-- Face details (Smirk/Raised eyebrow) -->
    <path d="M-14,-12 Q-8,-16 -2,-12" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" />
    <circle cx="-8" cy="-6" r="4" fill="#000" />
    <circle cx="8" cy="-6" r="4" fill="#000" />
    <path d="M-6,14 Q4,10 8,12" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
